<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <link rel="shortcut icon" href="./img/logo.jpg" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWF | 북극곰 보호 캠페인</title>
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/common.css">
    <link rel="stylesheet" href="./styles/index.css">
    <link rel="stylesheet" href="./styles/responsive.css">
</head>
<body>
    <div id="wrap">
        <!-- 1행 캠페인 표지 -->
        <section class="container intro">
            <p class="logo"><img src="./img/logo.jpg" alt=""></p>
            <h1><span>생존의 벼랑 끝에 서 있는</span><span>
북극곰을 지켜주세요</span></h1>
            <a href="#" class="sponser_btn"><em>북극곰 후원하기</em><!-- ::after로 옆에 버튼 "> 이미지" 넣기 --></a>
        </section>
        <!-- 2행 퀴즈 -->
        <div class="container quiz_bg">
            <section class="container quiz">
                <div class="q_zone">
                    <h1>Quiz</h1>
                    <h2><span>20년 사이 북극 빙하 면적은</span><span>몇 % 감소했을까요?</span></h2>
                    <form action="#" method="get" id="q_form">
                        <ol id="quiz_list">
                            <li>
                                <input type="radio" name="quiz_chk" value="p_30" id="p_30" class="quiz_chk">
                                <label for="p_30">30%</label>
                            </li>
                            <li>
                                <input type="radio" name="quiz_chk" value="p_40" id="p_40" class="quiz_chk">
                                <label for="p_40">40%</label>
                            </li>
                            <li>
                                <input type="radio" name="quiz_chk" value="p_50" id="p_50" class="quiz_chk">
                                <label for="p_50">50%</label>
                            </li>
                            <li>
                                <input type="radio" name="quiz_chk" value="p_60" id="p_60" class="quiz_chk">
                                <label for="p_60">60%</label>
                            </li>
                        </ol>
                        <button type="button" id="ansr_btn">정답 확인 하기</button>
                    </form>
                </div>
                <div class="q_now">
                    <p class="q_img"><img src="./img/q_img38387.png" alt=""></p>
                    <p>*퀴즈 참여 현황은 매주 업데이트 됩니다</p>
                </div>
            </section>
        </div>
        <!-- 3행 동영상 -->
        <!-- 4행 50감소 -->
        <!-- 5행 인류재앙 -->
        <!-- 6행 빙하위기 -->

        <!-- 8행 활동내역 -->
        <!-- 9행 선물정보 -->
        <!-- 10행 안내-->
    </div>
</body>
</html>
